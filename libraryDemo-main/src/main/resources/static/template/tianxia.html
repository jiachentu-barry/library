<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界の本</title>
  <link rel="stylesheet" href="/css/tianxia.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div>
        <h1 class="site-title">世界の本</h1>
        <p class="site-title-sub">良書を発見 · お知らせを確認 · 世界を探索</p>
      </div>
      <nav class="site-nav">
        <a id="nav-home" class="site-nav-home" href="/template/index.html" hidden>管理画面へ</a>
        <a id="nav-login" href="/template/login.html">ユーザーログイン</a>
        <a id="nav-register" href="/template/register.html">ユーザー登録</a>
        <a id="nav-profile" href="/template/profile.html">私の貸出</a>
        <span id="nav-user" class="nav-user" hidden></span>
        <button id="nav-logout" class="nav-logout" type="button" hidden>ログアウト</button>
      </nav>
    </div>
  </header>

  <div class="wrap">
    <div class="content">
      <aside class="panel panel-sticky">
        <div class="mobile-feature-row">
          <section class="feature-block feature-announcements">
            <h2 class="section-title">システムお知らせ</h2>
            <p class="section-sub">最新情報。クリックして詳細を表示。</p>
            <div id="announcement-list"></div>
          </section>

          <section class="feature-block feature-recommended">
            <div class="section-title-row">
              <h2 class="section-title">おすすめ書籍</h2>
              <button class="refresh-btn" id="refresh-recommended" title="ランダムシャッフル">シャッフル</button>
            </div>
            <p class="section-sub">おすすめの3冊をランダムに表示。</p>
            <div id="recommended-list"></div>
          </section>
        </div>
      </aside>

      <section class="panel">
        <h2 class="section-title">書籍一覧</h2>
        <p class="section-sub">すべての所蔵書籍を表示。</p>
        <div id="borrow-stats" class="stats-grid" aria-live="polite"></div>
        <div class="search-row">
          <input id="book-search" class="search-input" type="search" placeholder="書名・著者・分類を検索" />
        </div>
        <div id="book-detail-panel" class="book-detail-panel" hidden></div>
        <div id="book-list" class="book-card-grid"></div>
        <div id="book-pagination" class="book-pagination" hidden></div>
      </section>
    </div>
  </div>

  <nav class="mobile-tabbar" aria-label="モバイルタブ">
    <a id="tab-home" class="tab-item" href="/template/index.html" hidden>管理画面へ</a>
    <a id="tab-profile" class="tab-item" href="/template/profile.html">私の貸出</a>
    <button id="tab-logout" class="tab-item tab-button" type="button" hidden>ログアウト</button>
  </nav>

  <script src="/js/auth.js"></script>
  <script>
    const AUTH = window.Demo5Auth;
    const bookListEl = document.getElementById('book-list');
    const recommendedListEl = document.getElementById('recommended-list');
    const announcementListEl = document.getElementById('announcement-list');
    const bookSearchEl = document.getElementById('book-search');
    const bookDetailPanelEl = document.getElementById('book-detail-panel');
    const bookPaginationEl = document.getElementById('book-pagination');
    const borrowStatsEl = document.getElementById('borrow-stats');
    const navHomeEl = document.getElementById('nav-home');
    const navProfileEl = document.getElementById('nav-profile');
    const navUserEl = document.getElementById('nav-user');
    const navLogoutEl = document.getElementById('nav-logout');
    const tabHomeEl = document.getElementById('tab-home');
    const tabProfileEl = document.getElementById('tab-profile');
    const tabLogoutEl = document.getElementById('tab-logout');

    const BOOKS_PER_PAGE = 6;
    let books = [];
    let reviews = [];
    let bookKeyword = '';
    let currentBookPage = 1;
    let selectedBookId = null;
    let activeBorrowMap = {}; // bookId -> borrowRecordId


    async function syncAuthUi() {
      const user = await AUTH.loadCurrentUser();
      const username = user?.username || '';
      const loggedIn = !!username;
      const isAdmin = AUTH.isAdmin(user);
      document.getElementById('nav-login').hidden = loggedIn;
      document.getElementById('nav-register').hidden = loggedIn;
      navHomeEl.hidden = !isAdmin;
      tabHomeEl.hidden = !isAdmin;
      if (!loggedIn) {
        navUserEl.hidden = true;
        navLogoutEl.hidden = true;
        tabLogoutEl.hidden = true;
        tabProfileEl.hidden = false;
        return;
      }
      navUserEl.hidden = false;
      navLogoutEl.hidden = false;
      tabLogoutEl.hidden = false;
      tabProfileEl.hidden = false;
      navUserEl.textContent = `ログイン中：${username}${isAdmin ? '（管理者）' : ''}`;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatTime(value) {
      if (!value) {
        return '-';
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleString();
    }

    function formatInt(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) {
        return '0';
      }
      return String(Math.max(0, Math.round(numeric)));
    }

    function starText(value) {
      const score = Math.min(5, Math.max(1, Math.round(Number(value) || 1)));
      return `<span class="rating-stars" aria-label="${score}星">${'★'.repeat(score)}${'☆'.repeat(5 - score)}</span>`;
    }

    function isBorrowable(stock) {
      return Number(stock) > 0;
    }

    function borrowStatusHtml(stock) {
      if (isBorrowable(stock)) {
        return '<span class="borrow-badge yes">貸出可能</span>';
      }
      return '<span class="borrow-badge no">貸出不可</span>';
    }

    function coverCell(imageUrl, title) {
      if (!imageUrl) {
        return '<div class="cover-empty">画像なし</div>';
      }
      return `<img class="book-cover" src="${escapeHtml(imageUrl)}" alt="${escapeHtml(title)}" loading="lazy" />`;
    }

    function recommendedCover(imageUrl, title) {
      if (!imageUrl) {
        return '<div class="recommended-cover-empty">画像なし</div>';
      }
      return `<img class="recommended-cover" src="${escapeHtml(imageUrl)}" alt="${escapeHtml(title)}" loading="lazy" />`;
    }

    function stateLabel(state) {
      return state === 'RECOMMENDED' ? 'おすすめ' : '一般';
    }

    function stateClass(state) {
      return state === 'RECOMMENDED' ? 'recommended' : '';
    }

    function getFilteredBooks() {
      const keyword = bookKeyword.trim().toLowerCase();
      if (!keyword) {
        return books;
      }
      return books.filter((book) => {
        const title = String(book.title || '').toLowerCase();
        const author = String(book.author || '').toLowerCase();
        const category = String(book.category || '').toLowerCase();
        return title.includes(keyword) || author.includes(keyword) || category.includes(keyword);
      });
    }

    function renderRecommendedBooks() {
      const pool = books.filter((book) => book.status === 'RECOMMENDED');
      recommendedListEl.innerHTML = '';
      if (!pool.length) {
        recommendedListEl.innerHTML = '<p class="empty">おすすめ書籍なし</p>';
        return;
      }

      // shuffle and pick 3
      const shuffled = pool.slice().sort(() => Math.random() - 0.5);
      const display = shuffled.slice(0, 3);

      display.forEach((book) => {
        const box = document.createElement('article');
        box.className = 'recommended-item';
        box.innerHTML = `
          ${recommendedCover(book.image, book.title)}
          <div class="recommended-info">
            <h3>${escapeHtml(book.title)}</h3>
            <p class="recommended-meta">${escapeHtml(book.author)} · 在庫 ${formatInt(book.stock)} · おすすめ度 ${starText(book.recommendationIndex)}</p>
            <p class="recommended-meta">${borrowStatusHtml(book.stock)}</p>
          </div>
        `;
        recommendedListEl.appendChild(box);
      });
    }

    function renderBookPagination(totalPages) {
      if (totalPages <= 1) {
        bookPaginationEl.hidden = true;
        bookPaginationEl.innerHTML = '';
        return;
      }

      const pages = Array.from({ length: totalPages }, (_, i) => i + 1)
        .map((page) => `<button class="page-btn${page === currentBookPage ? ' active' : ''}" type="button" data-page="${page}">${page}</button>`)
        .join('');

      bookPaginationEl.hidden = false;
      bookPaginationEl.innerHTML = `
        <button class="page-btn" type="button" data-action="prev" ${currentBookPage === 1 ? 'disabled' : ''}>前へ</button>
        ${pages}
        <button class="page-btn" type="button" data-action="next" ${currentBookPage === totalPages ? 'disabled' : ''}>次へ</button>
      `;
    }

    function renderBooks() {
      const list = getFilteredBooks();
      if (!list.some((book) => String(book.id) === String(selectedBookId))) {
        selectedBookId = null;
      }
      bookListEl.innerHTML = '';
      if (!books.length) {
        bookListEl.innerHTML = '<p class="empty">書籍なし</p>';
        bookPaginationEl.hidden = true;
        bookPaginationEl.innerHTML = '';
        renderBookDetail();
        return;
      }

      if (!list.length) {
        bookListEl.innerHTML = '<p class="empty">一致する書籍が見つかりません</p>';
        bookPaginationEl.hidden = true;
        bookPaginationEl.innerHTML = '';
        renderBookDetail();
        return;
      }

      const totalPages = Math.max(1, Math.ceil(list.length / BOOKS_PER_PAGE));
      if (currentBookPage > totalPages) {
        currentBookPage = totalPages;
      }
      if (currentBookPage < 1) {
        currentBookPage = 1;
      }

      const startIndex = (currentBookPage - 1) * BOOKS_PER_PAGE;
      const visibleBooks = list.slice(startIndex, startIndex + BOOKS_PER_PAGE);
      if (!visibleBooks.some((book) => String(book.id) === String(selectedBookId))) {
        selectedBookId = null;
      }

      visibleBooks.forEach((book) => {
        const card = document.createElement('article');
        const isActive = String(selectedBookId) === String(book.id);
        card.className = `book-card${isBorrowable(book.stock) ? '' : ' unavailable'}${isActive ? ' is-active' : ''}`;
        card.tabIndex = 0;
        card.setAttribute('role', 'button');
        card.setAttribute('aria-expanded', isActive ? 'true' : 'false');
        card.dataset.bookId = String(book.id);
        const innerImg = book.image
          ? `<img class="book-card-img" src="${escapeHtml(book.image)}" alt="${escapeHtml(book.title)}" loading="lazy" />`
          : `<div class="book-card-img-empty">表紙なし</div>`;
        const imgHtml = `<div class="book-card-img-wrap">${innerImg}</div>`;
        card.innerHTML = `
          ${imgHtml}
          <div class="book-card-body">
            <h3 class="book-card-title">${escapeHtml(book.title)}</h3>
            <p class="book-card-rating">おすすめ度：${starText(book.recommendationIndex)}</p>
          </div>
        `;
        bookListEl.appendChild(card);
      });

      renderBookPagination(totalPages);
      renderBookDetail();
    }

    function detailCoverHtml(book) {
      if (!book.image) {
        return '<div class="book-detail-cover-empty">表紙なし</div>';
      }
      return `<img class="book-detail-cover" src="${escapeHtml(book.image)}" alt="${escapeHtml(book.title)}" loading="lazy" />`;
    }

    function reviewListHtml(book) {
      const list = getReviewsForBook(book.id);
      if (!list.length) {
        return '<p class="empty">まだレビューがありません。最初のレビューを書きましょう。</p>';
      }
      return `
        <div class="review-list">
          ${list.map((r) => `
            <article class="review-item">
              <div class="review-head">
                <span class="review-book">${escapeHtml(r.username)}</span>
                <span>${reviewStarText(r.rating)} · ${formatTime(r.createdAt)}</span>
              </div>
              <p class="review-comment">${escapeHtml(r.comment || '（テキストなし）')}</p>
            </article>
          `).join('')}
        </div>
      `;
    }

    function renderBookDetail() {
      if (selectedBookId == null) {
        bookDetailPanelEl.hidden = true;
        bookDetailPanelEl.innerHTML = '';
        return;
      }
      const book = books.find((item) => String(item.id) === String(selectedBookId));
      if (!book) {
        selectedBookId = null;
        bookDetailPanelEl.hidden = true;
        bookDetailPanelEl.innerHTML = '';
        return;
      }
      bookDetailPanelEl.hidden = false;
      bookDetailPanelEl.innerHTML = `
        <article class="book-detail-card">
          <div class="book-detail-layout">
            <div class="book-detail-cover-wrap">
              ${detailCoverHtml(book)}
            </div>
            <div class="book-detail-main">
              <div class="book-detail-head">
                <div>
                  <h3 class="book-detail-title">${escapeHtml(book.title)}</h3>
                  <p class="book-detail-meta">他の書籍カードをクリックして詳細を切り替え</p>
                </div>
                <button class="book-detail-close" type="button" data-action="close-book-detail">閉じる</button>
              </div>
              <div class="book-detail-meta-grid">
                <p class="book-detail-meta">著者：${escapeHtml(book.author)}</p>
                <p class="book-detail-meta">分類：${escapeHtml(book.category)}</p>
                <p class="book-detail-meta">蔵書タイプ：<span class="book-chip ${stateClass(book.status)}">${stateLabel(book.status)}</span></p>
                <p class="book-detail-meta">おすすめ度：${starText(book.recommendationIndex)}</p>
              </div>
              <div class="book-detail-footer">
                <span class="book-detail-price">在庫：${formatInt(book.stock)}</span>
                <div class="book-detail-action-row">
                  ${borrowStatusHtml(book.stock)}
                  ${borrowBtnHtml(book)}
                </div>
              </div>
              <div class="book-detail-review-box">
                <div class="section-title-row">
                  <h3 class="section-title">書籍レビュー</h3>
                  <button class="refresh-btn" type="button" data-action="refresh-reviews">レビューを更新</button>
                </div>
                <p class="section-sub">このカードの下にレビューが表示されます。</p>
                <form class="review-form" data-action="submit-review">
                  <select name="rating" required>
                    <option value="5">5点</option>
                    <option value="4">4点</option>
                    <option value="3">3点</option>
                    <option value="2">2点</option>
                    <option value="1">1点</option>
                  </select>
                  <input name="comment" maxlength="400" placeholder="レビューを書いてください（最大400文字）" />
                  <button type="submit" data-role="submit-review">レビューを投稿</button>
                </form>
                ${reviewListHtml(book)}
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function toggleBookCard(bookId) {
      const id = String(bookId || '');
      if (!id) {
        return;
      }
      selectedBookId = String(selectedBookId) === id ? null : id;
      renderBooks();
    }

    async function handleBorrowAction(btn) {
      if (!btn || btn.disabled) return;
      const username = AUTH.getStoredUsername();
      if (!username) {
        alert('ログインしてください');
        window.location.href = '/login.html';
        return;
      }
      const borrowId = btn.dataset.borrowId;
      const bookId = btn.dataset.bookId;
      btn.disabled = true;
      try {
        if (borrowId) {
          const res = await fetch(`/api/borrow/${borrowId}/return`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
          });
          const data = await res.json();
          if (!res.ok) { alert(data.message || '返却失敗'); return; }
        } else if (bookId) {
          const res = await fetch('/api/borrow', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, bookId: Number(bookId) })
          });
          const data = await res.json();
          if (!res.ok) { alert(data.message || '貸出失敗'); return; }
        }
        await loadBooks();
        await loadUserBorrows();
        await loadBorrowStats();
      } catch (err) {
        alert('リクエスト失敗。後でお試しください');
      } finally {
        btn.disabled = false;
      }
    }

    async function submitReview(form) {
      const username = AUTH.getStoredUsername();
      if (!username) {
        alert('レビューを投稿するにはログインしてください');
        window.location.href = '/login.html';
        return;
      }
      const bookId = Number(selectedBookId || 0);
      const rating = Number(form.elements.rating.value || 0);
      const comment = String(form.elements.comment.value || '').trim();
      if (!bookId) {
        alert('先に書籍を選んでください');
        return;
      }
      const submitBtn = form.querySelector('[data-role="submit-review"]');
      submitBtn.disabled = true;
      try {
        const res = await fetch('/api/reviews', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, bookId, rating, comment })
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.message || 'レビューの投稿に失敗しました');
          return;
        }
        form.reset();
        form.elements.rating.value = '5';
        await loadReviews();
      } catch (error) {
        alert('リクエスト失敗。後でお試しください');
      } finally {
        submitBtn.disabled = false;
      }
    }

    function renderBorrowStats(stats) {
      const safe = stats || {};
      const yesterday = Number.isFinite(Number(safe.yesterdayBorrowCount)) ? Number(safe.yesterdayBorrowCount) : 0;
      const today = Number.isFinite(Number(safe.todayBorrowCount)) ? Number(safe.todayBorrowCount) : 0;
      const topName = safe.mostBorrowedBookName ? String(safe.mostBorrowedBookName) : 'データなし';
      const topCount = Number.isFinite(Number(safe.mostBorrowedBookCount)) ? Number(safe.mostBorrowedBookCount) : 0;

      borrowStatsEl.innerHTML = `
        <article class="stat-card">
          <p class="stat-label">昨日の貸出数</p>
          <p class="stat-value">${formatInt(yesterday)}</p>
          <p class="stat-meta">貸出日時ベース</p>
        </article>
        <article class="stat-card">
          <p class="stat-label">今日の貸出数</p>
          <p class="stat-value">${formatInt(today)}</p>
          <p class="stat-meta">リアルタイム更新</p>
        </article>
        <article class="stat-card">
          <p class="stat-label">最多貸出書籍</p>
          <p class="stat-value">${escapeHtml(topName)}</p>
          <p class="stat-meta">累計貸出回数 ${formatInt(topCount)} 次</p>
        </article>
      `;
    }

    function reviewStarText(value) {
      const score = Math.min(5, Math.max(1, Math.round(Number(value) || 1)));
      return `${'★'.repeat(score)}${'☆'.repeat(5 - score)}`;
    }

    function getReviewsForBook(bookId) {
      return reviews.filter((item) => String(item.bookId) === String(bookId)).slice(0, 8);
    }

    function renderReviews(items) {
      const list = Array.isArray(items) ? items.slice(0, 12) : [];
      reviews = list;
      renderBookDetail();
    }

    async function loadReviews() {
      try {
        const res = await fetch('/api/reviews');
        if (!res.ok) {
          throw new Error('レビューの読み込みに失敗しました');
        }
        const data = await res.json();
        renderReviews(Array.isArray(data) ? data : []);
      } catch (error) {
        reviews = [];
        renderBookDetail();
      }
    }

    async function loadBorrowStats() {
      try {
        const res = await fetch('/api/borrow/stats');
        if (!res.ok) {
          throw new Error('統計の読み込みに失敗しました');
        }
        const data = await res.json();
        renderBorrowStats(data);
      } catch (error) {
        renderBorrowStats({
          yesterdayBorrowCount: 0,
          todayBorrowCount: 0,
          mostBorrowedBookName: '読み込み失敗',
          mostBorrowedBookCount: 0
        });
      }
    }

    function borrowBtnHtml(book) {
      const username = AUTH.getStoredUsername();
      if (!username) return '';
      const borrowId = activeBorrowMap[book.id];
      if (borrowId != null) {
        return `<button class="borrow-btn return-btn" data-borrow-id="${borrowId}" data-book-id="${book.id}">返却</button>`;
      }
      if (!isBorrowable(book.stock)) {
        return `<button class="borrow-btn" disabled>在庫なし</button>`;
      }
      return `<button class="borrow-btn" data-book-id="${book.id}">貸出</button>`;
    }

    async function loadUserBorrows() {
      const username = AUTH.getStoredUsername();
      if (!username) {
        activeBorrowMap = {};
        return;
      }
      try {
        const res = await fetch(`/api/users/${encodeURIComponent(username)}/borrows`);
        if (!res.ok) { activeBorrowMap = {}; return; }
        const data = await res.json();
        activeBorrowMap = {};
        (Array.isArray(data) ? data : []).forEach((r) => {
          if (r.status === 'BORROWED') activeBorrowMap[r.bookId] = r.id;
        });
        renderBooks();
      } catch (e) {
        activeBorrowMap = {};
      }
    }

    async function loadBooks() {
      try {
        const res = await fetch('/api/books');
        if (!res.ok) {
          throw new Error('書籍の読み込みに失敗しました');
        }
        const data = await res.json();
        books = Array.isArray(data) ? data : [];
        renderBooks();
        renderRecommendedBooks();
      } catch (error) {
        books = [];
        renderBooks();
        renderRecommendedBooks();
      }
    }

    bookListEl.addEventListener('click', async (e) => {
      const btn = e.target.closest('.borrow-btn');
      if (btn) {
        await handleBorrowAction(btn);
        return;
      }
      const card = e.target.closest('.book-card');
      if (!card) {
        return;
      }
      toggleBookCard(card.dataset.bookId);
    });

    bookDetailPanelEl.addEventListener('click', async (e) => {
      const closeBtn = e.target.closest('[data-action="close-book-detail"]');
      if (closeBtn) {
        selectedBookId = null;
        renderBooks();
        return;
      }
      const refreshBtn = e.target.closest('[data-action="refresh-reviews"]');
      if (refreshBtn) {
        await loadReviews();
        return;
      }
      const borrowBtn = e.target.closest('.borrow-btn');
      if (borrowBtn) {
        await handleBorrowAction(borrowBtn);
      }
    });

    bookDetailPanelEl.addEventListener('submit', async (e) => {
      const form = e.target.closest('form[data-action="submit-review"]');
      if (!form) {
        return;
      }
      e.preventDefault();
      await submitReview(form);
    });

    bookListEl.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter' && e.key !== ' ') {
        return;
      }
      const card = e.target.closest('.book-card');
      if (!card) {
        return;
      }
      e.preventDefault();
      toggleBookCard(card.dataset.bookId);
    });

    bookPaginationEl.addEventListener('click', (e) => {
      const target = e.target.closest('button');
      if (!target || target.disabled) {
        return;
      }
      const list = getFilteredBooks();
      const totalPages = Math.max(1, Math.ceil(list.length / BOOKS_PER_PAGE));
      if (target.dataset.action === 'prev') {
        currentBookPage = Math.max(1, currentBookPage - 1);
      } else if (target.dataset.action === 'next') {
        currentBookPage = Math.min(totalPages, currentBookPage + 1);
      } else if (target.dataset.page) {
        const nextPage = Number(target.dataset.page);
        if (Number.isFinite(nextPage) && nextPage >= 1 && nextPage <= totalPages) {
          currentBookPage = nextPage;
        }
      }
      renderBooks();
    });

    function renderAnnouncements(items) {
      announcementListEl.innerHTML = '';
      if (!items.length) {
        announcementListEl.innerHTML = '<p class="empty">お知らせなし</p>';
        return;
      }

      items.forEach((item) => {
        const box = document.createElement('article');
        box.className = 'announcement-item';
        box.innerHTML = `
          <h3>
            <span class="announcement-title-text">${escapeHtml(item.title)}</span>
            <span class="announcement-toggle">展開</span>
          </h3>
          <p class="announcement-meta">${formatTime(item.publishedAt)}</p>
          <p class="announcement-content">${escapeHtml(item.content)}</p>
        `;
        box.addEventListener('click', () => {
          const isOpen = box.classList.toggle('open');
          box.querySelector('.announcement-toggle').textContent = isOpen ? '折りたたむ' : '展開';
        });
        announcementListEl.appendChild(box);
      });
    }

    async function loadAnnouncements() {
      try {
        const res = await fetch('/api/announcements');
        const data = await res.json();
        renderAnnouncements(Array.isArray(data) ? data : []);
      } catch (error) {
        announcementListEl.innerHTML = '<p class="empty">お知らせの読み込みに失敗しました。後でリロードしてください。</p>';
      }
    }

    loadBooks().then(() => loadUserBorrows());
    loadAnnouncements();
    loadBorrowStats();
    loadReviews();

    bookSearchEl.addEventListener('input', () => {
      bookKeyword = bookSearchEl.value || '';
      currentBookPage = 1;
      renderBooks();
    });

    document.getElementById('refresh-recommended').addEventListener('click', () => {
      renderRecommendedBooks();
    });

    navLogoutEl.addEventListener('click', () => {
      AUTH.clearUser();
      syncAuthUi();
      window.location.href = '/login.html';
    });

    tabLogoutEl.addEventListener('click', () => {
      AUTH.clearUser();
      syncAuthUi();
      window.location.href = '/login.html';
    });

    syncAuthUi();
  </script>
</body>
</html>
