<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理画面 - 書籍追加</title>
  <link rel="stylesheet" href="/css/admin/book-upload.css" />
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>書籍の追加と編集</h1>
      <p class="subtitle">書籍を新規追加、または一覧から編集モードへ。</p>

      <nav class="admin-nav" aria-label="管理ナビ">
        <a href="/template/index.html">管理ホーム</a>
        <a href="/template/admin/books.html">書籍編集</a>
        <a class="active" href="/template/admin/book-upload.html">書籍追加</a>
        <a href="/template/admin/borrows.html">貸出一覧</a>
        <a href="/template/admin/announcements.html">お知らせ管理</a>
        <a href="/template/admin/reviews.html">レビュー一覧</a>
        <a href="/template/admin/users.html">ユーザー管理</a>
      </nav>

      <form id="book-form" class="book-form">
        <div>
          <label for="book-title">書名</label>
          <input id="book-title" maxlength="120" required />
        </div>
        <div>
          <label for="book-author">著者</label>
          <input id="book-author" maxlength="80" required />
        </div>
        <div>
          <label for="book-category">分類</label>
          <input id="book-category" maxlength="50" placeholder="例：コンピュータ / 文学 / 歴史" required />
        </div>
        <div>
          <label for="book-stock">在庫数</label>
          <input id="book-stock" type="number" min="0" max="999999" step="1" required />
        </div>
        <div>
          <label for="book-recommendation-index">おすすめ度</label>
          <input id="book-recommendation-index" type="number" min="1" max="5" step="1" required />
        </div>
        <div>
          <label for="book-image-file">画像アップロード</label>
          <div class="upload-box">
            <input id="book-image-file" type="file" accept="image/*" />
            <img id="book-image-preview" class="upload-preview" alt="表紙プレビュー" />
            <p class="upload-tip">ローカルファイルをアップロード可能。保存前に自動圧縮されます。</p>
          </div>
        </div>
        <div>
          <label for="book-state">状態</label>
          <select id="book-state">
            <option value="NORMAL">一般</option>
            <option value="RECOMMENDED">おすすめ</option>
          </select>
        </div>
      </form>

      <div class="actions">
        <button id="save-book" type="button">書籍を追加</button>
        <button id="back-list" class="secondary" type="button">書籍一覧へ戻る</button>
        <p id="book-status" class="status"></p>
      </div>
    </section>
  </main>

  <script src="/js/auth.js"></script>
  <script>
    const AUTH = window.Demo5Auth;
    const adminHeaders = () => AUTH.buildAuthHeaders(AUTH.getStoredUser());
    AUTH.requireAdminPage();

    const form = document.getElementById('book-form');
    const titleInput = document.getElementById('book-title');
    const authorInput = document.getElementById('book-author');
    const categoryInput = document.getElementById('book-category');
    const stockInput = document.getElementById('book-stock');
    const recommendationIndexInput = document.getElementById('book-recommendation-index');
    const imageFileInput = document.getElementById('book-image-file');
    const imagePreview = document.getElementById('book-image-preview');
    const stateInput = document.getElementById('book-state');
    const saveBookBtn = document.getElementById('save-book');
    const backListBtn = document.getElementById('back-list');
    const statusEl = document.getElementById('book-status');

    const idParam = new URLSearchParams(window.location.search).get('id');
    const editingBookId = Number(idParam);

    let currentImage = '';

    function setStatus(message, isError) {
      statusEl.textContent = message || '';
      statusEl.className = isError ? 'status error' : 'status';
    }

    function updateImagePreview(image) {
      currentImage = image || '';
      if (!currentImage) {
        imagePreview.style.display = 'none';
        imagePreview.removeAttribute('src');
        return;
      }
      imagePreview.src = currentImage;
      imagePreview.style.display = 'block';
    }

    function loadImage(dataUrl) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error('画像の解析に失敗しました'));
        image.src = dataUrl;
      });
    }

    function readAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(typeof reader.result === 'string' ? reader.result : '');
        reader.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
        reader.readAsDataURL(file);
      });
    }

    async function compressImage(file) {
      const rawDataUrl = await readAsDataUrl(file);
      const image = await loadImage(rawDataUrl);

      const maxSide = 420;
      const ratio = Math.min(1, maxSide / Math.max(image.width, image.height));
      const width = Math.max(1, Math.round(image.width * ratio));
      const height = Math.max(1, Math.round(image.height * ratio));

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        return rawDataUrl;
      }

      ctx.drawImage(image, 0, 0, width, height);
      const compressed = canvas.toDataURL('image/jpeg', 0.72);
      return compressed || rawDataUrl;
    }

    async function loadBookForEdit() {
      if (!Number.isFinite(editingBookId) || editingBookId <= 0) {
        return;
      }
      try {
        const res = await fetch(`/api/books/${editingBookId}`);
        if (!res.ok) {
          throw new Error('書籍が存在しません');
        }
        const book = await res.json();
        titleInput.value = book.title || '';
        authorInput.value = book.author || '';
        categoryInput.value = book.category || '';
        stockInput.value = String(Number.isFinite(Number(book.stock)) ? Number(book.stock) : 0);
        recommendationIndexInput.value = String(Number.isFinite(Number(book.recommendationIndex)) ? Math.min(5, Math.max(1, Math.round(Number(book.recommendationIndex)))) : 1);
        stateInput.value = book.status === 'RECOMMENDED' ? 'RECOMMENDED' : 'NORMAL';
        updateImagePreview(book.image || '');
        saveBookBtn.textContent = '変更を保存';
        setStatus('編集モードに入りました', false);
      } catch (error) {
        setStatus(error.message || '書籍の読み込みに失敗しました', true);
      }
    }

    async function upsertBook() {
      const payload = {
        title: titleInput.value.trim(),
        author: authorInput.value.trim(),
        category: categoryInput.value.trim(),
        stock: Number(stockInput.value),
        recommendationIndex: Number(recommendationIndexInput.value),
        image: currentImage,
        status: stateInput.value === 'RECOMMENDED' ? 'RECOMMENDED' : 'NORMAL'
      };

      if (!payload.title || !payload.author || !payload.category) {
        setStatus('書籍情報をすべて入力してください', true);
        return;
      }
      if (!Number.isFinite(payload.stock) || payload.stock < 0) {
        setStatus('在庫数は0以上の整数にしてください', true);
        return;
      }
      if (!Number.isFinite(payload.recommendationIndex) || payload.recommendationIndex < 1 || payload.recommendationIndex > 5) {
        setStatus('おすすめ度必须是 1-5 的整数', true);
        return;
      }

      payload.stock = Math.round(payload.stock);
      payload.recommendationIndex = Math.round(payload.recommendationIndex);

      try {
        const isEdit = Number.isFinite(editingBookId) && editingBookId > 0;
        const url = isEdit ? `/api/books/${editingBookId}` : '/api/books';
        const method = isEdit ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            ...adminHeaders()
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const errorBody = await res.json().catch(() => ({}));
          throw new Error(errorBody.message || (isEdit ? '更新失敗' : '追加失敗'));
        }

        if (isEdit) {
          setStatus('書籍を更新しました。一覧に戻ります…', false);
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 800);
          return;
        }

        form.reset();
        imageFileInput.value = '';
        updateImagePreview('');
        stateInput.value = 'NORMAL';
        setStatus('書籍を追加しました。続けて追加できます', false);
      } catch (error) {
        setStatus(error.message || '保存失敗', true);
      }
    }

    saveBookBtn.addEventListener('click', upsertBook);

    imageFileInput.addEventListener('change', async () => {
      const file = imageFileInput.files && imageFileInput.files[0];
      if (!file) {
        return;
      }
      if (!file.type.startsWith('image/')) {
        setStatus('画像ファイルを選択してください', true);
        imageFileInput.value = '';
        return;
      }
      try {
        const compressed = await compressImage(file);
        updateImagePreview(compressed);
        setStatus('画像を圧縮しました。書籍を保存できます', false);
      } catch (error) {
        setStatus(error.message || '画像の読み込みに失敗しました。再試行してください', true);
      }
    });

    backListBtn.addEventListener('click', () => {
      window.location.href = '/admin/books.html';
    });

    loadBookForEdit();
  </script>
</body>
</html>
