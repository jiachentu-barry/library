<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理画面 - ユーザー管理</title>
  <link rel="stylesheet" href="/css/admin/users.css" />
</head>
<body>
  <div class="container">
    <section class="card">
      <h1>管理画面 - ユーザー管理</h1>
      <nav class="admin-nav" aria-label="管理ナビ">
        <a href="/template/index.html">管理ホーム</a>
        <a href="/template/admin/books.html">書籍編集</a>
        <a href="/template/admin/book-upload.html">書籍追加</a>
        <a href="/template/admin/borrows.html">貸出一覧</a>
        <a href="/template/admin/announcements.html">お知らせ管理</a>
        <a href="/template/admin/reviews.html">レビュー一覧</a>
        <a class="active" href="/template/admin/users.html">ユーザー管理</a>
      </nav>

      <div class="toolbar">
        <input id="keyword" type="search" placeholder="ユーザー名を検索" />
        <select id="roleFilter">
          <option value="ALL">すべてのロール</option>
          <option value="ADMIN">管理者のみ</option>
          <option value="USER">一般ユーザーのみ</option>
        </select>
        <button id="refreshBtn" type="button">更新</button>
        <p id="status" class="status"></p>
      </div>

      <div id="tableWrap" class="responsive-wrap" hidden>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>ユーザー名</th>
              <th>現在のロール</th>
              <th>ロールを変更</th>
              <th>作成日時</th>
            </tr>
          </thead>
          <tbody id="userList"></tbody>
        </table>
      </div>
      <p id="empty" class="empty" hidden>ユーザーデータなし</p>
    </section>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const AUTH = window.Demo5Auth;
    const adminHeaders = () => AUTH.buildAuthHeaders(AUTH.getStoredUser());
    AUTH.requireAdminPage();

    const keywordEl = document.getElementById('keyword');
    const roleFilterEl = document.getElementById('roleFilter');
    const refreshBtn = document.getElementById('refreshBtn');
    const statusEl = document.getElementById('status');
    const tableWrapEl = document.getElementById('tableWrap');
    const userListEl = document.getElementById('userList');
    const emptyEl = document.getElementById('empty');

    let users = [];

    function setStatus(message, mode) {
      statusEl.textContent = message || '';
      statusEl.className = mode ? `status ${mode}` : 'status';
    }

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatTime(value) {
      if (!value) {
        return '-';
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function getFilteredUsers() {
      const keyword = String(keywordEl.value || '').trim().toLowerCase();
      const roleFilter = String(roleFilterEl.value || 'ALL');
      return users.filter((item) => {
        if (roleFilter !== 'ALL' && item.role !== roleFilter) {
          return false;
        }
        if (!keyword) {
          return true;
        }
        return String(item.username || '').toLowerCase().includes(keyword);
      });
    }

    function renderUsers() {
      const list = getFilteredUsers();
      userListEl.innerHTML = '';

      if (!list.length) {
        tableWrapEl.hidden = true;
        emptyEl.hidden = false;
        return;
      }

      tableWrapEl.hidden = false;
      emptyEl.hidden = true;

      list.forEach((item) => {
        const row = document.createElement('tr');
        const role = item.role === 'ADMIN' ? 'ADMIN' : 'USER';
        row.innerHTML = `
          <td>${Number(item.id) || '-'}</td>
          <td>${escapeHtml(item.username)}</td>
          <td><span class="role-tag ${role}">${role === 'ADMIN' ? '管理者' : '一般ユーザー'}</span></td>
          <td>
            <div class="role-editor">
              <select data-role-select data-id="${item.id}">
                <option value="USER" ${role === 'USER' ? 'selected' : ''}>一般ユーザー</option>
                <option value="ADMIN" ${role === 'ADMIN' ? 'selected' : ''}>管理者</option>
              </select>
              <button type="button" data-save-role data-id="${item.id}">保存</button>
            </div>
          </td>
          <td>${escapeHtml(formatTime(item.createdAt))}</td>
        `;
        userListEl.appendChild(row);
      });
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/admin/users', {
          headers: adminHeaders()
        });
        const data = await res.json().catch(() => []);
        if (!res.ok) {
          throw new Error(data.message || 'ユーザー一覧の読み込みに失敗しました');
        }
        users = Array.isArray(data) ? data : [];
        renderUsers();
        setStatus(`合計 ${users.length} 人`, 'ok');
      } catch (error) {
        users = [];
        renderUsers();
        setStatus(error.message || 'ユーザー一覧の読み込みに失敗しました', 'error');
      }
    }

    async function saveUserRole(id, role, button) {
      button.disabled = true;
      try {
        const res = await fetch(`/api/admin/users/${id}/role`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            ...adminHeaders()
          },
          body: JSON.stringify({ role })
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(body.message || 'ロールの更新に失敗しました');
        }
        setStatus(`ユーザー ${body.username || id} のロールを更新しました`, 'ok');
        await loadUsers();
      } catch (error) {
        setStatus(error.message || 'ロールの更新に失敗しました', 'error');
      } finally {
        button.disabled = false;
      }
    }

    userListEl.addEventListener('click', async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) {
        return;
      }
      const button = target.closest('button[data-save-role]');
      if (!button) {
        return;
      }
      const id = Number(button.dataset.id || '0');
      if (!id) {
        return;
      }
      const select = userListEl.querySelector(`select[data-role-select][data-id="${id}"]`);
      if (!(select instanceof HTMLSelectElement)) {
        return;
      }
      const role = select.value === 'ADMIN' ? 'ADMIN' : 'USER';
      await saveUserRole(id, role, button);
    });

    keywordEl.addEventListener('input', renderUsers);
    roleFilterEl.addEventListener('change', renderUsers);
    refreshBtn.addEventListener('click', loadUsers);

    loadUsers();
  </script>
</body>
</html>
