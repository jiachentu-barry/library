<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>頁面暫時不可用</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Microsoft YaHei", sans-serif;
      background: #f6f8fc;
      color: #1f2a44;
      padding: 16px;
    }

    .card {
      width: min(520px, 100%);
      background: #fff;
      border: 1px solid #dbe2f0;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(31, 42, 68, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.6;
      color: #53607a;
    }

    a {
      color: #1a73e8;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>此頁面目前無法運作</h1>
    <p>系統已攔截循環重定向，請返回登入頁再試一次。</p>
    <p><a href="/template/login.html">前往登入頁</a></p>
  </div>
</body>
</html>
