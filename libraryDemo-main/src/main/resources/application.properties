spring.application.name=demo5

# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://library-pg.cxa2y02sgvf7.ap-northeast-1.rds.amazonaws.com:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Daily CSV export for yesterday's borrow records
borrow.export.cron=0 30 15 * * *
borrow.export.zone=Asia/Tokyo
borrow.export.output-dir=exports/borrows

# Error handling
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-stacktrace=on_param

# Static resource caching
spring.web.resources.cache.period=86400
spring.web.resources.static-locations=classpath:/static/



